openapi: 3.0.3
info:
  title: FreshStock API
  version: 1.0.0
  description: API REST para inventario de minimarkets con control de stock, vencimientos y auditoría.
servers:
  - url: http://localhost:8080
    description: Entorno Docker local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        campos:
          type: object
          additionalProperties:
            type: string
    RegisterRequest:
      type: object
      required: [nombre, correo, contrasena]
      properties:
        nombre: { type: string, example: Yosep Eusebio }
        correo: { type: string, format: email, example: yosep@example.com }
        contrasena: { type: string, format: password, example: Clave1234 }
    LoginRequest:
      type: object
      required: [correo, contrasena]
      properties:
        correo: { type: string, format: email, example: admin@freshstock.local }
        contrasena: { type: string, format: password, example: Admin123* }
    CategoryRequest:
      type: object
      required: [nombre]
      properties:
        nombre: { type: string, example: Conservas }
        descripcion: { type: string, nullable: true, example: Alimentos enlatados }
    ProductRequest:
      type: object
      required: [categoria_id, nombre, codigo_barras, unidad_medida, precio, stock_actual, stock_minimo]
      properties:
        categoria_id: { type: integer, example: 1 }
        nombre: { type: string, example: Atún en lata }
        codigo_barras: { type: string, example: "775100000010" }
        descripcion: { type: string, nullable: true, example: Atún en aceite de 170 g }
        unidad_medida: { type: string, example: lata }
        precio: { type: number, format: float, example: 6.5 }
        stock_actual: { type: integer, minimum: 0, example: 20 }
        stock_minimo: { type: integer, minimum: 0, example: 5 }
        fecha_vencimiento: { type: string, format: date, nullable: true, example: "2027-01-31" }
    MovementRequest:
      type: object
      required: [producto_id, cantidad, tipo_movimiento]
      properties:
        producto_id: { type: integer, example: 1 }
        cantidad: { type: integer, minimum: 1, example: 5 }
        tipo_movimiento: { type: string, enum: [ENTRADA, SALIDA], example: ENTRADA }
        motivo: { type: string, nullable: true, example: Compra a proveedor }
paths:
  /health:
    get:
      summary: Verificar estado del servicio y la base de datos
      responses:
        '200': { description: Servicio saludable }
  /auth/register:
    post:
      summary: Registrar un usuario operador
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { description: Usuario creado }
        '409': { description: Correo duplicado, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: Datos inválidos, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /auth/login:
    post:
      summary: Iniciar sesión y obtener JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Inicio de sesión correcto }
        '401': { description: Credenciales incorrectas }
  /api/categories:
    get:
      summary: Listar categorías paginadas
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { in: query, name: filter, schema: { type: string } }
      responses:
        '200': { description: Lista de categorías }
        '401': { description: Token ausente o inválido }
    post:
      summary: Crear categoría (solo admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRequest' }
      responses:
        '201': { description: Categoría creada }
        '403': { description: Rol sin permiso }
        '422': { description: Datos inválidos }
  /api/categories/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      summary: Obtener categoría
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Categoría encontrada }
        '404': { description: Categoría no encontrada }
    put:
      summary: Actualizar categoría (solo admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRequest' }
      responses:
        '200': { description: Categoría actualizada }
        '403': { description: Rol sin permiso }
    delete:
      summary: Eliminar categoría de forma lógica (solo admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Categoría eliminada }
        '409': { description: La categoría tiene productos activos }
  /api/products:
    get:
      summary: Listar productos con paginación y filtros
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { in: query, name: filter, schema: { type: string } }
        - { in: query, name: category_id, schema: { type: integer } }
        - { in: query, name: low_stock, schema: { type: boolean } }
        - { in: query, name: expiring_days, schema: { type: integer, minimum: 1, maximum: 365 } }
      responses:
        '200': { description: Lista de productos con JOIN de categoría }
    post:
      summary: Crear producto
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductRequest' }
      responses:
        '201': { description: Producto creado }
        '409': { description: Código de barras duplicado }
        '422': { description: Datos inválidos }
  /api/products/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      summary: Obtener producto
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Producto encontrado }
        '404': { description: Producto no encontrado }
    put:
      summary: Actualizar producto
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductRequest' }
      responses:
        '200': { description: Producto actualizado }
        '422': { description: Datos inválidos }
    delete:
      summary: Eliminar producto de forma lógica (solo admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Producto eliminado }
        '403': { description: Rol sin permiso }
  /api/stock/movements:
    get:
      summary: Listar historial de movimientos con JOIN de productos y usuarios
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Historial paginado }
    post:
      summary: Registrar entrada o salida de stock
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MovementRequest' }
      responses:
        '201': { description: Movimiento registrado }
        '422': { description: Datos inválidos o stock insuficiente }
  /api/alerts/low-stock:
    get:
      summary: Obtener productos en stock mínimo
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Alertas de stock }
  /api/alerts/expiring:
    get:
      summary: Obtener productos próximos a vencer
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: days, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        '200': { description: Alertas de vencimiento }
  /api/dashboard/summary:
    get:
      summary: Obtener métricas agregadas del tablero
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Resumen del inventario }
